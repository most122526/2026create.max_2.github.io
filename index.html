<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>智能控制面板 | 双键设备控制</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #eef2f8;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, -apple-system, sans-serif;
            padding: 20px 16px 40px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-app {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            padding: 20px 18px 30px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .glass-card {
            background: #ffffff;
            border-radius: 36px;
            padding: 24px 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #e9edf2;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e2b6e, #3b5bdb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 8px;
        }

        .sub {
            text-align: center;
            color: #5a6e8a;
            font-size: 0.85rem;
            margin-bottom: 28px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1f2a44;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            background: #f8fafc;
            border: 1px solid #cfdfed;
            padding: 14px 16px;
            border-radius: 28px;
            font-size: 0.95rem;
            color: #0f172a;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #3b5bdb;
            box-shadow: 0 0 0 3px rgba(59, 91, 219, 0.15);
        }

        .btn-primary {
            background: linear-gradient(95deg, #3b5bdb, #6366f1);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            margin-top: 12px;
            box-shadow: 0 4px 12px rgba(59, 91, 219, 0.3);
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn-primary:active { transform: scale(0.97); }

        /* 时间卡片 */
        .time-card {
            background: #f1f5f9;
            border-radius: 28px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #e2e8f0;
        }
        .time-label {
            font-weight: 600;
            color: #334155;
            font-size: 0.85rem;
        }
        .time-value {
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e2b6e;
            letter-spacing: 0.5px;
        }

        /* 传感器卡片 */
        .sensor-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        .sensor-card {
            flex: 1;
            background: #f1f5f9;
            border-radius: 28px;
            padding: 16px 8px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .sensor-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #475569;
        }
        .sensor-value {
            font-size: 2.1rem;
            font-weight: 800;
            color: #0f172a;
            line-height: 1.2;
        }
        .unit {
            font-size: 0.8rem;
            color: #64748b;
        }

        /* 设备双按钮卡片 */
        .device-dual-card {
            background: #ffffff;
            border-radius: 28px;
            margin-bottom: 16px;
            padding: 14px 18px;
            border: 1px solid #eef2f8;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.1s;
        }
        .device-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .device-icon {
            font-size: 1.6rem;
        }
        .device-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: #1e293b;
            flex: 1;
        }
        .status-led {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background: #cbd5e1;
            display: inline-block;
            margin-left: 8px;
        }
        .status-led.on {
            background: #10b981;
            box-shadow: 0 0 6px #10b981;
        }
        .status-led.off {
            background: #ef4444;
        }
        .button-group {
            display: flex;
            gap: 14px;
            justify-content: flex-end;
        }
        .ctrl-dual-btn {
            flex: 1;
            padding: 12px 0;
            border-radius: 48px;
            font-weight: 700;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: 0.08s linear;
            background: #f1f5f9;
            color: #1e293b;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .ctrl-dual-btn.on-btn {
            background: #e6f7ec;
            color: #0a6e3d;
            border: 1px solid #c0e0c8;
        }
        .ctrl-dual-btn.off-btn {
            background: #fff0f0;
            color: #b91c2e;
            border: 1px solid #ffd6d6;
        }
        .ctrl-dual-btn:active { transform: scale(0.96); opacity: 0.8;}

        /* 场景区域 */
        .scene-section {
            margin-top: 28px;
            border-top: 1px solid #e9edf2;
            padding-top: 20px;
        }
        .scene-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
        }
        .scene-title {
            font-weight: 700;
            color: #0f172a;
            font-size: 1rem;
        }
        .add-scene {
            background: #eef2ff;
            border: none;
            border-radius: 40px;
            padding: 6px 16px;
            color: #1e3a8a;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }
        .scene-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .scene-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #3b5bdb;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            border: 1px solid #e9edf2;
        }
        .scene-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: #0f172a;
        }
        .scene-actions {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background: #f1f5f9;
            border: none;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
        }
        .exec-status {
            font-size: 0.75rem;
            color: #0f3b2c;
            background: #e6f7ec;
            padding: 10px 12px;
            border-radius: 28px;
            margin-top: 16px;
            text-align: center;
        }

        /* 模态框 */
        .modal-mask {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-container {
            width: 90%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 40px;
            padding: 24px;
            border: 1px solid #cfdfed;
        }
        .action-list {
            max-height: 320px;
            overflow-y: auto;
            margin: 15px 0;
        }
        .action-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            align-items: center;
        }
        select, .modal-container input {
            background: #f8fafc;
            border: 1px solid #cfdfed;
            padding: 8px 12px;
            border-radius: 24px;
            color: #0f172a;
        }
    </style>
</head>
<body>
<div class="phone-app" id="app">
    <div id="loginPanel" class="glass-card">
        <h1>🏠 智能中枢</h1>
        <div class="sub">巴法云 · 双键精确控制</div>
        <div class="input-group">
            <label>🔑 登录密码</label>
            <input type="password" id="loginPass" placeholder="请输入密码" value="12345678">
        </div>
        <button class="btn-primary" id="doLoginBtn">进入控制台 →</button>
        <div style="margin-top: 20px; font-size:12px; color:#5a6e8a; text-align:center;">每个设备独立开/关 (a1~a9,b)<br>场景顺序联动 | 毫秒级响应</div>
    </div>

    <div id="mainPanel" style="display: none;">
        <div style="background: #f1f5f9; border-radius: 50px; padding: 8px 14px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size:0.75rem; font-weight:600; color:#334155;">⚙️ 巴法云配置</span>
            <button id="editConfigBtn" style="background: none; border: none; color:#3b5bdb; font-size:0.75rem; font-weight:500;">✏️ 修改</button>
        </div>

        <div class="time-card">
            <span class="time-label">🕒 网络时间</span>
            <span class="time-value" id="networkTime">--:--:--</span>
        </div>
        
        <div class="sensor-row">
            <div class="sensor-card"><div class="sensor-label">🌡️ 温度</div><div class="sensor-value" id="tempValue">--</div><div class="unit">°C</div></div>
            <div class="sensor-card"><div class="sensor-label">💧 湿度</div><div class="sensor-value" id="humiValue">--</div><div class="unit">%RH</div></div>
        </div>

        <!-- 设备双按钮列表容器 -->
        <div id="devicesContainer"></div>

        <div class="scene-section">
            <div class="scene-header">
                <span class="scene-title">🎬 智能场景 (顺序执行)</span>
                <button id="addSceneBtn" class="add-scene">+ 自定义场景</button>
            </div>
            <div id="sceneListContainer" class="scene-list"></div>
            <div id="sceneExecMsg" class="exec-status"></div>
        </div>
    </div>
</div>

<script>
    // ======================= 巴法云配置 =======================
    let uid = "28449f804baf4a4a87efedc38a9e60ac";
    let dataTopic = "wifiyuyinshuju";
    let ctrlTopic = "wifiyuyinctrl";
    let separator = "#";
    let pollingInterval = null;
    let isExecutingScene = false;
    let timeSyncInterval = null;

    // 设备映射: 每个设备拥有 开指令 / 关指令 (a1~a9,b)
    // 要求: 风扇开a1关a2, 窗帘开a3关a4, 照明开a5关a6, 加湿器开a7关a8, 报警开a9关b
    const deviceList = [
        { id: 'fan', label: '风扇', icon: '🌀', onCmd: 'a1', offCmd: 'a2', stateKey: 'fan' },
        { id: 'curtain', label: '窗帘', icon: '🪟', onCmd: 'a3', offCmd: 'a4', stateKey: 'curtain' },
        { id: 'light', label: '照明', icon: '💡', onCmd: 'a5', offCmd: 'a6', stateKey: 'light' },
        { id: 'humidifier', label: '加湿器', icon: '💨', onCmd: 'a7', offCmd: 'a8', stateKey: 'humidifier' },
        { id: 'alarm', label: '报警', icon: '🚨', onCmd: 'a9', offCmd: 'b', stateKey: 'alarm' }
    ];
    
    let currentState = { fan: false, curtain: false, light: false, humidifier: false, alarm: false };
    let temperature = "--";
    let humidity = "--";
    
    // 场景数据
    let scenes = [];
    let sceneNextId = 1;
    
    // ======================= 辅助函数 =======================
    function saveScenesToLocal() {
        localStorage.setItem('smart_scenes_v2', JSON.stringify(scenes));
        localStorage.setItem('sceneNextId_v2', sceneNextId);
    }
    
    function loadScenesFromLocal() {
        const saved = localStorage.getItem('smart_scenes_v2');
        if(saved) {
            scenes = JSON.parse(saved);
            const savedId = localStorage.getItem('sceneNextId_v2');
            if(savedId) sceneNextId = parseInt(savedId);
            else sceneNextId = scenes.length ? Math.max(...scenes.map(s=>s.id),0)+1 : 1;
        } else {
            scenes = [
                { id: sceneNextId++, name: "🏡 回家模式", actions: [
                    { deviceId: "light", targetState: "on", delayMs: 300 },
                    { deviceId: "fan", targetState: "on", delayMs: 400 },
                    { deviceId: "curtain", targetState: "on", delayMs: 300 }
                ] },
                { id: sceneNextId++, name: "🌙 睡眠模式", actions: [
                    { deviceId: "light", targetState: "off", delayMs: 200 },
                    { deviceId: "fan", targetState: "off", delayMs: 200 }
                ] }
            ];
            saveScenesToLocal();
        }
        renderSceneList();
    }
    
    function renderSceneList() {
        const container = document.getElementById('sceneListContainer');
        if(!container) return;
        if(scenes.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#64748b; padding:16px;">点击+ 添加场景</div>';
            return;
        }
        container.innerHTML = scenes.map(scene => `
            <div class="scene-card" data-scene-id="${scene.id}">
                <div class="scene-info">
                    <div class="scene-name">${escapeHtml(scene.name)}</div>
                    <div style="font-size: 0.65rem; color:#5a6e8a;">${scene.actions.length}个动作</div>
                </div>
                <div class="scene-actions">
                    <button class="icon-btn edit-scene" data-id="${scene.id}">✏️</button>
                    <button class="icon-btn run-scene" data-id="${scene.id}">▶️ 执行</button>
                    <button class="icon-btn delete-scene" data-id="${scene.id}" style="background:#fee2e2;">🗑️</button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.edit-scene').forEach(btn => {
            btn.addEventListener('click', (e) => { const id = parseInt(btn.dataset.id); openSceneEditor(id); });
        });
        document.querySelectorAll('.run-scene').forEach(btn => {
            btn.addEventListener('click', (e) => { const id = parseInt(btn.dataset.id); triggerSceneById(id); });
        });
        document.querySelectorAll('.delete-scene').forEach(btn => {
            btn.addEventListener('click', (e) => { const id = parseInt(btn.dataset.id); deleteSceneById(id); });
        });
    }
    
    function deleteSceneById(id) {
        scenes = scenes.filter(s => s.id !== id);
        saveScenesToLocal();
        renderSceneList();
        showExecMsg(`场景已删除`, 1500);
    }
    
    function openSceneEditor(sceneId = null) {
        let scene = sceneId ? scenes.find(s=>s.id === sceneId) : null;
        const isNew = !scene;
        let name = scene ? scene.name : "新场景";
        let actions = scene ? [...scene.actions] : [];
        
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal-mask';
        modalDiv.innerHTML = `
            <div class="modal-container">
                <h3 style="margin-bottom:12px; color:#0f172a;">${isNew ? '新建场景' : '编辑场景'}</h3>
                <div class="input-group" style="margin-bottom:12px;">
                    <label>场景名称</label>
                    <input id="sceneNameInput" value="${escapeHtml(name)}" placeholder="例如: 离家模式">
                </div>
                <div><label style="font-weight:600;">📋 动作序列 (顺序执行)</label></div>
                <div id="actionEditorList" class="action-list"></div>
                <button id="addActionBtn" style="background:#eef2ff; border:none; border-radius:40px; padding:8px; width:100%; margin-bottom:12px; font-weight:600;">+ 添加动作</button>
                <div style="display:flex; gap:12px;">
                    <button id="saveSceneBtn" class="btn-primary" style="flex:1;">保存场景</button>
                    <button id="closeModalBtn" style="flex:1; background:#e2e8f0; border:none; border-radius:40px; font-weight:600;">取消</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        
        const actionContainer = modalDiv.querySelector('#actionEditorList');
        function renderActions() {
            actionContainer.innerHTML = '';
            actions.forEach((act, idx) => {
                const row = document.createElement('div');
                row.className = 'action-row';
                const devSelect = document.createElement('select');
                deviceList.forEach(dev => {
                    const opt = document.createElement('option');
                    opt.value = dev.id;
                    opt.textContent = dev.label;
                    if(act.deviceId === dev.id) opt.selected = true;
                    devSelect.appendChild(opt);
                });
                const stateSelect = document.createElement('select');
                stateSelect.innerHTML = `<option value="on">开启</option><option value="off">关闭</option>`;
                if(act.targetState === 'off') stateSelect.value = 'off';
                const delayInput = document.createElement('input');
                delayInput.type = 'number';
                delayInput.value = act.delayMs;
                delayInput.placeholder = '延迟(ms)';
                delayInput.style.width = '90px';
                const removeBtn = document.createElement('button');
                removeBtn.textContent = '✖';
                removeBtn.style.background = '#fee2e2';
                removeBtn.style.border = 'none';
                removeBtn.style.borderRadius = '30px';
                removeBtn.style.padding = '4px 12px';
                removeBtn.style.cursor = 'pointer';
                removeBtn.onclick = () => { actions.splice(idx,1); renderActions(); };
                row.appendChild(devSelect);
                row.appendChild(stateSelect);
                row.appendChild(delayInput);
                row.appendChild(removeBtn);
                actionContainer.appendChild(row);
                devSelect.onchange = () => { act.deviceId = devSelect.value; };
                stateSelect.onchange = () => { act.targetState = stateSelect.value; };
                delayInput.onchange = () => { act.delayMs = parseInt(delayInput.value) || 200; };
            });
        }
        renderActions();
        
        modalDiv.querySelector('#addActionBtn').onclick = () => {
            actions.push({ deviceId: "light", targetState: "on", delayMs: 400 });
            renderActions();
        };
        modalDiv.querySelector('#saveSceneBtn').onclick = () => {
            const newName = modalDiv.querySelector('#sceneNameInput').value.trim();
            if(!newName) { alert("请输入场景名称"); return; }
            if(actions.length === 0) { alert("至少添加一个动作"); return; }
            const finalActions = actions.map(a => ({ deviceId: a.deviceId, targetState: a.targetState, delayMs: Math.max(80, a.delayMs || 200) }));
            if(isNew) {
                const newId = sceneNextId++;
                scenes.push({ id: newId, name: newName, actions: finalActions });
            } else {
                scene.name = newName;
                scene.actions = finalActions;
            }
            saveScenesToLocal();
            renderSceneList();
            document.body.removeChild(modalDiv);
            showExecMsg(`场景“${newName}”已保存`, 1200);
        };
        modalDiv.querySelector('#closeModalBtn').onclick = () => document.body.removeChild(modalDiv);
    }
    
    async function triggerSceneById(sceneId) {
        if(isExecutingScene) { showExecMsg("已有场景执行中,请稍后...", 1500); return; }
        const scene = scenes.find(s=>s.id === sceneId);
        if(!scene) return;
        isExecutingScene = true;
        showExecMsg(`🏃 执行场景: ${scene.name} ... 获取状态`, 0);
        try {
            await fetchLatestSensorData();
            showExecMsg(`✨ 开始顺序执行: ${scene.actions.length}步`, 1000);
            for(let i=0; i<scene.actions.length; i++) {
                const action = scene.actions[i];
                const device = deviceList.find(d => d.id === action.deviceId);
                if(device) {
                    const cmd = (action.targetState === 'on') ? device.onCmd : device.offCmd;
                    await sendBemfaCommand(cmd);
                    showExecMsg(`✅ ${device.label} ${action.targetState === 'on' ? '开启' : '关闭'}`, 600);
                }
                if(i !== scene.actions.length-1) await delay(action.delayMs);
            }
            showExecMsg(`🎉 场景 "${scene.name}" 执行完成！`, 2000);
            setTimeout(()=> fetchLatestSensorData(), 300);
        } catch(err) {
            showExecMsg(`❌ 场景执行出错`, 2000);
        } finally {
            isExecutingScene = false;
        }
    }
    
    function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
    
    // 核心发送：纯指令 a1~a9 / b
    async function sendBemfaCommand(command) {
        const finalMsg = command.trim();
        try {
            const params = new URLSearchParams();
            params.append('uid', uid);
            params.append('topic', ctrlTopic);
            params.append('type', '3');
            params.append('msg', finalMsg);
            const response = await fetch('https://apis.bemfa.com/va/postmsg', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            });
            if(!response.ok) throw new Error("发送失败");
            console.log(`指令发送: ${finalMsg}`);
            return true;
        } catch(e) {
            console.warn("发送错误", e);
            throw e;
        }
    }
    
    async function fetchLatestSensorData() {
        try {
            const url = `https://apis.bemfa.com/va/getmsg?uid=${uid}&topic=${dataTopic}&type=3&num=1`;
            const resp = await fetch(url);
            const data = await resp.json();
            if(data && data.data && data.data.length > 0 && data.data[0].msg) {
                const rawMsg = data.data[0].msg;
                const parts = rawMsg.split(separator).filter(p => p.trim() !== "");
                if(parts.length >= 3) {
                    temperature = parts[0];
                    humidity = parts[1];
                    let stateParam = parts[2].toString();
                    while(stateParam.length < 5) stateParam = "0"+stateParam;
                    currentState = {
                        fan: (stateParam.charAt(0) === '2'),
                        curtain: (stateParam.charAt(1) === '1'),
                        light: (stateParam.charAt(2) === '1'),
                        humidifier: (stateParam.charAt(3) === '1'),
                        alarm: (stateParam.charAt(4) === '1')
                    };
                    renderDevicesUI();
                }
            }
        } catch(e) { console.warn("轮询错误", e); }
    }
    
    function renderDevicesUI() {
        const container = document.getElementById('devicesContainer');
        if(!container) return;
        container.innerHTML = deviceList.map(dev => {
            const isOn = currentState[dev.stateKey];
            return `
                <div class="device-dual-card">
                    <div class="device-header">
                        <span class="device-icon">${dev.icon}</span>
                        <span class="device-title">${dev.label}
                            <span class="status-led ${isOn ? 'on' : 'off'}"></span>
                        </span>
                    </div>
                    <div class="button-group">
                        <button class="ctrl-dual-btn on-btn" data-device="${dev.id}" data-cmd="${dev.onCmd}">🔛 开启</button>
                        <button class="ctrl-dual-btn off-btn" data-device="${dev.id}" data-cmd="${dev.offCmd}">🔴 关闭</button>
                    </div>
                </div>
            `;
        }).join('');
        // 绑定双按钮事件
        document.querySelectorAll('[data-cmd]').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                if(isExecutingScene) { showExecMsg("场景执行中,稍后操作", 1000); return; }
                const cmd = btn.getAttribute('data-cmd');
                const devId = btn.getAttribute('data-device');
                const device = deviceList.find(d => d.id === devId);
                await sendBemfaCommand(cmd);
                showExecMsg(`📡 ${device.label} ${cmd === device.onCmd ? '开启' : '关闭'}指令已发送`, 800);
                setTimeout(()=> fetchLatestSensorData(), 200);
            });
        });
    }
    
    function updateSensorUI() {
        document.getElementById('tempValue').innerHTML = temperature;
        document.getElementById('humiValue').innerHTML = humidity;
    }
    
    function showExecMsg(msg, duration=1500) {
        const msgDiv = document.getElementById('sceneExecMsg');
        if(msgDiv) { msgDiv.innerText = msg; if(duration>0) setTimeout(()=>{ if(msgDiv.innerText===msg) msgDiv.innerText=''; }, duration); }
    }
    
    function startPolling() {
        if(pollingInterval) clearInterval(pollingInterval);
        fetchLatestSensorData();
        pollingInterval = setInterval(() => {
            if(!isExecutingScene) fetchLatestSensorData();
        }, 550);
        setInterval(() => updateSensorUI(), 200);
    }
    
    async function fetchNetworkTime() {
        try {
            const response = await fetch('https://worldtimeapi.org/api/timezone/Asia/Shanghai');
            if (!response.ok) throw new Error();
            const data = await response.json();
            const localTime = new Date(data.datetime);
            const timeString = localTime.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('networkTime').innerText = timeString;
        } catch (error) {
            const now = new Date();
            document.getElementById('networkTime').innerText = now.toLocaleTimeString('zh-CN', { hour12: false });
        }
    }
    
    function startTimeSync() {
        fetchNetworkTime();
        setInterval(fetchNetworkTime, 30000);
        setInterval(() => {
            const elem = document.getElementById('networkTime');
            if(elem && elem.innerText !== '--:--:--') {
                const now = new Date();
                elem.innerText = now.toLocaleTimeString('zh-CN', { hour12: false });
            }
        }, 1000);
    }
    
    function initMainPanel() {
        loadScenesFromLocal();
        startPolling();
        startTimeSync();
        renderDevicesUI();
        document.getElementById('editConfigBtn').onclick = () => {
            const newUid = prompt("输入UID", uid);
            const newDataTopic = prompt("数据主题", dataTopic);
            const newCtrlTopic = prompt("控制主题", ctrlTopic);
            if(newUid) uid = newUid;
            if(newDataTopic) dataTopic = newDataTopic;
            if(newCtrlTopic) ctrlTopic = newCtrlTopic;
            startPolling();
        };
        document.getElementById('addSceneBtn').onclick = () => openSceneEditor(null);
    }
    
    document.getElementById('doLoginBtn').addEventListener('click', () => {
        const pwd = document.getElementById('loginPass').value;
        if(pwd === '12345678') {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
            initMainPanel();
        } else alert("密码错误");
    });
    
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
</script>
</body>
</html>
