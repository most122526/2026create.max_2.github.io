<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>智能控制面板 | 巴法云场景联动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #e9f0f5;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, -apple-system, sans-serif;
            padding: 20px 16px 40px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 手机容器 - 明亮风格 */
        .phone-app {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            padding: 20px 18px 30px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* 登录界面卡片 */
        .login-card, .main-panel {
            transition: all 0.3s ease;
        }

        .glass-card {
            background: #ffffff;
            border-radius: 36px;
            padding: 24px 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e2b6e, #3b5bdb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 8px;
        }

        .sub {
            text-align: center;
            color: #5a6e8a;
            font-size: 0.85rem;
            margin-bottom: 28px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1f2a44;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .input-group input {
            width: 100%;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            padding: 14px 16px;
            border-radius: 28px;
            font-size: 0.95rem;
            color: #0f172a;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #3b5bdb;
            box-shadow: 0 0 0 3px rgba(59, 91, 219, 0.2);
        }

        .btn-primary {
            background: linear-gradient(95deg, #3b5bdb, #6366f1);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            margin-top: 12px;
            box-shadow: 0 6px 14px rgba(59, 91, 219, 0.25);
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn-primary:active { transform: scale(0.97); }

        /* 仪表盘样式 - 亮色 */
        .sensor-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .sensor-card {
            flex: 1;
            background: #f1f5f9;
            border-radius: 28px;
            padding: 16px 8px;
            text-align: center;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .sensor-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #475569;
            letter-spacing: 0.5px;
        }

        .sensor-value {
            font-size: 2.1rem;
            font-weight: 800;
            color: #0f172a;
            line-height: 1.2;
        }

        .unit {
            font-size: 0.8rem;
            color: #64748b;
        }

        /* 时间卡片 */
        .time-card {
            background: #f1f5f9;
            border-radius: 28px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #e2e8f0;
        }
        .time-label {
            font-weight: 600;
            color: #334155;
            font-size: 0.85rem;
        }
        .time-value {
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e2b6e;
            letter-spacing: 0.5px;
        }

        /* 设备状态网格 */
        .device-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0 24px;
        }

        .device-item {
            background: #f8fafc;
            border-radius: 28px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }

        .device-name {
            font-weight: 600;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .led-indicator {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background: #cbd5e1;
            box-shadow: 0 0 2px rgba(0,0,0,0.1);
        }
        .led-indicator.on {
            background: #10b981;
            box-shadow: 0 0 6px #10b981;
        }
        .led-indicator.off {
            background: #ef4444;
        }

        .ctrl-btn-small {
            background: #eef2ff;
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 600;
            color: #1e3a8a;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .ctrl-btn-small:active { background: #cbdffc; }

        /* 按钮控制栏 */
        .button-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 28px;
            justify-content: space-between;
        }

        .action-btn {
            flex: 1;
            background: #eef2ff;
            border: none;
            padding: 12px 0;
            border-radius: 60px;
            font-weight: 600;
            color: #1e3a8a;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .action-btn:active { background: #d9e6ff; transform: scale(0.96);}

        /* 场景专区 */
        .scene-section {
            margin-top: 20px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
        .scene-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 14px;
        }
        .scene-title {
            font-weight: 700;
            color: #0f172a;
        }
        .add-scene {
            background: #eef2ff;
            border: none;
            border-radius: 40px;
            padding: 6px 16px;
            color: #1e3a8a;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }
        .scene-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .scene-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #3b5bdb;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            border: 1px solid #e2e8f0;
        }
        .scene-info {
            flex: 1;
        }
        .scene-name {
            font-weight: 700;
            font-size: 1rem;
            color: #0f172a;
        }
        .scene-actions {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background: #f1f5f9;
            border: none;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1e293b;
            cursor: pointer;
        }

        .exec-status {
            font-size: 0.75rem;
            color: #0f3b2c;
            background: #e6f7ec;
            padding: 8px 12px;
            border-radius: 28px;
            margin-top: 12px;
            text-align: center;
        }

        /* 模态框 */
        .modal-mask {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-container {
            width: 90%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 40px;
            padding: 24px;
            border: 1px solid #cbd5e1;
        }
        .action-list {
            max-height: 320px;
            overflow-y: auto;
            margin: 15px 0;
        }
        .action-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            align-items: center;
        }
        select, .modal-container input {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            padding: 8px 12px;
            border-radius: 24px;
            color: #0f172a;
        }
        button.danger { background: #fee2e2; color:#b91c2e; }
        .modal-container .btn-primary { margin-top: 8px; }
    </style>
</head>
<body>
<div class="phone-app" id="app">
    <!-- 登录界面 -->
    <div id="loginPanel" class="glass-card">
        <h1>🏠 智能中枢</h1>
        <div class="sub">巴法云 · 场景联动面板</div>
        <div class="input-group">
            <label>🔑 登录密码</label>
            <input type="password" id="loginPass" placeholder="请输入密码" value="12345678">
        </div>
        <button class="btn-primary" id="doLoginBtn">进入控制台 →</button>
        <div style="margin-top: 20px; font-size:12px; color:#5a6e8a; text-align:center;">支持场景顺序+自定义间隔<br>下发格式 #0#a1# ～ #0#a5#</div>
    </div>

    <!-- 主面板 (默认隐藏) -->
    <div id="mainPanel" style="display: none;">
        <!-- 配置栏 -->
        <div style="background: #f1f5f9; border-radius: 50px; padding: 8px 14px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size:0.75rem; font-weight:600; color:#334155;">⚙️ 巴法云配置</span>
            <button id="editConfigBtn" style="background: none; border: none; color:#3b5bdb; font-size:0.75rem; font-weight:500;">✏️ 修改</button>
        </div>

        <!-- 网络时间显示 -->
        <div class="time-card">
            <span class="time-label">🕒 网络时间</span>
            <span class="time-value" id="networkTime">--:--:--</span>
        </div>
        
        <!-- 温湿度传感器卡片 -->
        <div class="sensor-row">
            <div class="sensor-card"><div class="sensor-label">🌡️ 温度</div><div class="sensor-value" id="tempValue">--</div><div class="unit">°C</div></div>
            <div class="sensor-card"><div class="sensor-label">💧 湿度</div><div class="sensor-value" id="humiValue">--</div><div class="unit">%RH</div></div>
        </div>

        <!-- 设备状态指示 + 单独控制按钮融合 -->
        <div class="device-grid" id="deviceStatusGrid"></div>

        <div class="button-bar">
            <button class="action-btn" data-device="fan">🌀 风扇</button>
            <button class="action-btn" data-device="curtain">🪟 窗帘</button>
            <button class="action-btn" data-device="light">💡 照明</button>
            <button class="action-btn" data-device="humidifier">💨 加湿器</button>
            <button class="action-btn" data-device="alarm">🚨 报警</button>
        </div>

        <!-- 场景自定义区域 -->
        <div class="scene-section">
            <div class="scene-header">
                <span class="scene-title">🎬 智能场景 (顺序执行)</span>
                <button id="addSceneBtn" class="add-scene">+ 自定义场景</button>
            </div>
            <div id="sceneListContainer" class="scene-list"></div>
            <div id="sceneExecMsg" class="exec-status"></div>
        </div>
    </div>
</div>

<script>
    // ---------- 全局变量 ----------
    let uid = "28449f804baf4a4a87efedc38a9e60ac";
    let dataTopic = "wifiyuyinshuju";
    let ctrlTopic = "wifiyuyinctrl";
    let separator = "#";
    let isLoggedIn = false;
    let pollingInterval = null;
    let currentState = {   
        fan: false,      
        curtain: false,
        light: false,
        humidifier: false,
        alarm: false
    };
    let temperature = "--";
    let humidity = "--";
    
    // 场景数组
    let scenes = [];
    let sceneNextId = 1;
    let isExecutingScene = false;
    
    // 网络时间同步定时器
    let timeSyncInterval = null;
    
    const deviceKeyMap = {
        fan: { key: 'fan', btnCmd: 'a1', label: '风扇', stateKey: 'fan' },
        curtain: { key: 'curtain', btnCmd: 'a2', label: '窗帘', stateKey: 'curtain' },
        light: { key: 'light', btnCmd: 'a3', label: '照明', stateKey: 'light' },
        humidifier: { key: 'humidifier', btnCmd: 'a4', label: '加湿器', stateKey: 'humidifier' },
        alarm: { key: 'alarm', btnCmd: 'a5', label: '报警', stateKey: 'alarm' }
    };
    const deviceList = ['fan', 'curtain', 'light', 'humidifier', 'alarm'];
    
    // ---------- 网络时间获取 ----------
    async function fetchNetworkTime() {
        try {
            // 使用世界时间API (Asia/Shanghai)
            const response = await fetch('https://worldtimeapi.org/api/timezone/Asia/Shanghai');
            if (!response.ok) throw new Error('时间同步失败');
            const data = await response.json();
            const datetimeStr = data.datetime;
            const localTime = new Date(datetimeStr);
            const hours = localTime.getHours().toString().padStart(2, '0');
            const minutes = localTime.getMinutes().toString().padStart(2, '0');
            const seconds = localTime.getSeconds().toString().padStart(2, '0');
            const timeString = `${hours}:${minutes}:${seconds}`;
            document.getElementById('networkTime').innerText = timeString;
        } catch (error) {
            console.warn("网络时间获取失败，使用本地时间", error);
            // 降级: 使用本地时间并继续同步尝试
            const now = new Date();
            const timeString = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('networkTime').innerText = timeString;
        }
    }
    
    function startTimeSync() {
        if (timeSyncInterval) clearInterval(timeSyncInterval);
        fetchNetworkTime(); // 立即执行一次
        timeSyncInterval = setInterval(fetchNetworkTime, 1000); // 每秒刷新显示，但API调用频率不宜过高，改为每30秒调用API，其余时间走本地递增? 为了显示平滑，我们仅使用API返回的时间作为基准，然后本地时钟递增。
        // 优化: 上面每秒fetch会太频繁，改为首次获取后本地计时器递增，每30秒校准一次。
        clearInterval(timeSyncInterval);
        // 重新实现: 用本地计时器维护，但定期校准
        let currentTime = new Date();
        fetchNetworkTime().then(() => {
            // 获取成功后，更新本地基准时间
            updateLocalClockWithOffset();
        });
        // 每30秒校准一次网络时间
        setInterval(() => {
            fetchNetworkTime().then(() => updateLocalClockWithOffset());
        }, 30000);
        // 启动本地时钟更新显示
        setInterval(() => {
            const timeElem = document.getElementById('networkTime');
            if (timeElem && timeElem.innerText !== '--:--:--') {
                // 尝试从当前显示的文本解析时间并递增1秒 (简化: 重新获取本地时间显示，保证流畅)
                const now = new Date();
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes().toString().padStart(2, '0');
                const seconds = now.getSeconds().toString().padStart(2, '0');
                timeElem.innerText = `${hours}:${minutes}:${seconds}`;
            }
        }, 1000);
    }
    
    function updateLocalClockWithOffset() {
        // 辅助: 直接调用 fetchNetworkTime 已更新显示，并且后续本地时钟会基于系统时间显示，大致准确
        // 不做额外偏移处理，因为每秒本地时间足够
    }
    
    // ---------- 辅助函数 ----------
    function saveScenesToLocal() {
        localStorage.setItem('smart_scenes', JSON.stringify(scenes));
        localStorage.setItem('sceneNextId', sceneNextId);
    }
    function loadScenesFromLocal() {
        const saved = localStorage.getItem('smart_scenes');
        if(saved) {
            scenes = JSON.parse(saved);
            const savedId = localStorage.getItem('sceneNextId');
            if(savedId) sceneNextId = parseInt(savedId);
            else sceneNextId = scenes.length ? Math.max(...scenes.map(s=>s.id),0)+1 : 1;
        } else {
            scenes = [
                { id: sceneNextId++, name: "🏡 回家模式", actions: [
                    { deviceKey: "light", delayMs: 300 },
                    { deviceKey: "fan", delayMs: 400 },
                    { deviceKey: "curtain", delayMs: 300 }
                ] },
                { id: sceneNextId++, name: "🌙 睡眠模式", actions: [
                    { deviceKey: "light", delayMs: 200 },
                    { deviceKey: "fan", delayMs: 200 }
                ] }
            ];
            saveScenesToLocal();
        }
        renderSceneList();
    }
    
    function renderSceneList() {
        const container = document.getElementById('sceneListContainer');
        if(!container) return;
        if(scenes.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#64748b; padding:16px;">点击+ 添加场景</div>';
            return;
        }
        container.innerHTML = scenes.map(scene => `
            <div class="scene-card" data-scene-id="${scene.id}">
                <div class="scene-info">
                    <div class="scene-name">${escapeHtml(scene.name)}</div>
                    <div style="font-size: 0.65rem; color:#5a6e8a;">${scene.actions.length}个动作</div>
                </div>
                <div class="scene-actions">
                    <button class="icon-btn edit-scene" data-id="${scene.id}">✏️</button>
                    <button class="icon-btn run-scene" data-id="${scene.id}">▶️ 执行</button>
                    <button class="icon-btn delete-scene" data-id="${scene.id}" style="background:#fee2e2;">🗑️</button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.edit-scene').forEach(btn => {
            btn.addEventListener('click', (e) => { const id = parseInt(btn.dataset.id); openSceneEditor(id); });
        });
        document.querySelectorAll('.run-scene').forEach(btn => {
            btn.addEventListener('click', (e) => { const id = parseInt(btn.dataset.id); triggerSceneById(id); });
        });
        document.querySelectorAll('.delete-scene').forEach(btn => {
            btn.addEventListener('click', (e) => { const id = parseInt(btn.dataset.id); deleteSceneById(id); });
        });
    }
    
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}
    
    function deleteSceneById(id) {
        scenes = scenes.filter(s => s.id !== id);
        saveScenesToLocal();
        renderSceneList();
        showExecMsg(`场景已删除`, 1500);
    }
    
    function openSceneEditor(sceneId = null) {
        let scene = sceneId ? scenes.find(s=>s.id === sceneId) : null;
        const isNew = !scene;
        let name = scene ? scene.name : "新场景";
        let actions = scene ? [...scene.actions] : [];
        
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal-mask';
        modalDiv.innerHTML = `
            <div class="modal-container">
                <h3 style="margin-bottom:12px; color:#0f172a;">${isNew ? '新建场景' : '编辑场景'}</h3>
                <div class="input-group" style="margin-bottom:12px;">
                    <label>场景名称</label>
                    <input id="sceneNameInput" value="${escapeHtml(name)}" placeholder="例如: 回家模式">
                </div>
                <div><label style="font-weight:600;">📋 动作序列 (顺序开启设备)</label></div>
                <div id="actionEditorList" class="action-list"></div>
                <button id="addActionBtn" style="background:#eef2ff; border:none; border-radius:40px; padding:8px; width:100%; margin-bottom:12px; font-weight:600;">+ 添加动作</button>
                <div style="display:flex; gap:12px;">
                    <button id="saveSceneBtn" class="btn-primary" style="flex:1;">保存场景</button>
                    <button id="closeModalBtn" style="flex:1; background:#e2e8f0; border:none; border-radius:40px; font-weight:600;">取消</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        
        const actionContainer = modalDiv.querySelector('#actionEditorList');
        function renderActions() {
            actionContainer.innerHTML = '';
            actions.forEach((act, idx) => {
                const row = document.createElement('div');
                row.className = 'action-row';
                const devSelect = document.createElement('select');
                deviceList.forEach(dk => {
                    const opt = document.createElement('option');
                    opt.value = dk;
                    opt.textContent = deviceKeyMap[dk].label;
                    if(act.deviceKey === dk) opt.selected = true;
                    devSelect.appendChild(opt);
                });
                const delayInput = document.createElement('input');
                delayInput.type = 'number';
                delayInput.value = act.delayMs;
                delayInput.placeholder = '延迟(ms)';
                delayInput.style.width = '90px';
                const removeBtn = document.createElement('button');
                removeBtn.textContent = '✖';
                removeBtn.style.background = '#fee2e2';
                removeBtn.style.border = 'none';
                removeBtn.style.borderRadius = '30px';
                removeBtn.style.padding = '4px 12px';
                removeBtn.style.cursor = 'pointer';
                removeBtn.onclick = () => { actions.splice(idx,1); renderActions(); };
                row.appendChild(devSelect);
                row.appendChild(delayInput);
                row.appendChild(removeBtn);
                actionContainer.appendChild(row);
                devSelect.onchange = () => { act.deviceKey = devSelect.value; };
                delayInput.onchange = () => { act.delayMs = parseInt(delayInput.value) || 200; };
            });
        }
        renderActions();
        
        modalDiv.querySelector('#addActionBtn').onclick = () => {
            actions.push({ deviceKey: 'light', delayMs: 400 });
            renderActions();
        };
        modalDiv.querySelector('#saveSceneBtn').onclick = () => {
            const newName = modalDiv.querySelector('#sceneNameInput').value.trim();
            if(!newName) { alert("请输入场景名称"); return; }
            if(actions.length === 0) { alert("至少添加一个动作"); return; }
            const finalActions = actions.map(a => ({ deviceKey: a.deviceKey, delayMs: Math.max(80, a.delayMs || 200) }));
            if(isNew) {
                const newId = sceneNextId++;
                scenes.push({ id: newId, name: newName, actions: finalActions });
            } else {
                scene.name = newName;
                scene.actions = finalActions;
            }
            saveScenesToLocal();
            renderSceneList();
            document.body.removeChild(modalDiv);
            showExecMsg(`场景“${newName}”已保存`, 1200);
        };
        modalDiv.querySelector('#closeModalBtn').onclick = () => document.body.removeChild(modalDiv);
    }
    
    // 执行场景 (先关所有设备 -> 顺序开启)
    async function triggerSceneById(sceneId) {
        if(isExecutingScene) { showExecMsg("已有场景执行中,请稍后...", 1500); return; }
        const scene = scenes.find(s=>s.id === sceneId);
        if(!scene) return;
        isExecutingScene = true;
        showExecMsg(`🏃 执行场景: ${scene.name} ... 获取最新设备状态`, 0);
        try {
            await fetchLatestSensorData();
            const toCloseDevices = deviceList.filter(devKey => currentState[devKey] === true);
            const CLOSE_INTERVAL = 130;
            showExecMsg(`⏳ 关闭所有已开启设备 (共${toCloseDevices.length}个)`, 1500);
            for(let i=0; i<toCloseDevices.length; i++) {
                await sendCommandByDeviceKey(toCloseDevices[i]);
                if(i !== toCloseDevices.length-1) await delay(CLOSE_INTERVAL);
            }
            showExecMsg(`✨ 开始顺序执行动作: ${scene.actions.length}步`, 1000);
            for(let i=0; i<scene.actions.length; i++) {
                const action = scene.actions[i];
                await sendCommandByDeviceKey(action.deviceKey);
                showExecMsg(`✅ 已触发: ${deviceKeyMap[action.deviceKey].label}`, 800);
                if(i !== scene.actions.length-1) await delay(action.delayMs);
            }
            showExecMsg(`🎉 场景 "${scene.name}" 执行完成！`, 2000);
            setTimeout(()=> fetchLatestSensorData(), 300);
        } catch(err) {
            console.error(err);
            showExecMsg(`❌ 场景执行出错: ${err.message}`, 2500);
        } finally {
            isExecutingScene = false;
        }
    }
    
    function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
    
    // 核心发送函数：将指令包装为 #0#控制量# 格式 (控制量为 a1~a5)
    async function sendBemfaCommand(rawCommand) {
        // 按照新需求: 下发格式 "#0#a1#" , "#0#a2#" 等
        const wrappedMsg = `#0#${rawCommand}#`;
        try {
            const params = new URLSearchParams();
            params.append('uid', uid);
            params.append('topic', ctrlTopic);
            params.append('type', '3');
            params.append('msg', wrappedMsg);
            const response = await fetch('https://apis.bemfa.com/va/postmsg', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            });
            if(!response.ok) throw new Error("发送失败");
            console.log(`指令已发送: ${wrappedMsg}`);
            return true;
        } catch(e) {
            console.warn("发送指令错误", e);
            throw e;
        }
    }
    
    async function sendCommandByDeviceKey(deviceKey) {
        const cmd = deviceKeyMap[deviceKey].btnCmd;  // a1~a5
        return sendBemfaCommand(cmd);
    }
    
    // 获取最新数据并解析 #温度#湿度#状态参数#
    async function fetchLatestSensorData() {
        try {
            const url = `https://apis.bemfa.com/va/getmsg?uid=${uid}&topic=${dataTopic}&type=3&num=1`;
            const resp = await fetch(url);
            const data = await resp.json();
            if(data && data.data && data.data.length > 0 && data.data[0].msg) {
                const rawMsg = data.data[0].msg;
                const parts = rawMsg.split(separator).filter(p => p.trim() !== "");
                if(parts.length >= 3) {
                    temperature = parts[0];
                    humidity = parts[1];
                    let stateParam = parts[2].toString();
                    while(stateParam.length < 5) stateParam = "0"+stateParam;
                    currentState = {
                        fan: (stateParam.charAt(0) === '2'),
                        curtain: (stateParam.charAt(1) === '1'),
                        light: (stateParam.charAt(2) === '1'),
                        humidifier: (stateParam.charAt(3) === '1'),
                        alarm: (stateParam.charAt(4) === '1')
                    };
                    updateUI();
                }
            }
        } catch(e) { console.warn("轮询错误", e); }
    }
    
    function updateUI() {
        document.getElementById('tempValue').innerHTML = temperature;
        document.getElementById('humiValue').innerHTML = humidity;
        const grid = document.getElementById('deviceStatusGrid');
        if(grid) {
            grid.innerHTML = deviceList.map(devKey => {
                const dev = deviceKeyMap[devKey];
                const isOn = currentState[devKey];
                return `
                    <div class="device-item">
                        <div class="device-name">
                            <span class="led-indicator ${isOn ? 'on' : 'off'}"></span>
                            <span>${dev.label}</span>
                        </div>
                        <button class="ctrl-btn-small" data-devctrl="${devKey}">${isOn ? '关闭' : '开启'}</button>
                    </div>
                `;
            }).join('');
            document.querySelectorAll('[data-devctrl]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const dev = btn.getAttribute('data-devctrl');
                    sendCommandByDeviceKey(dev).then(()=>{
                        showExecMsg(`已发送${deviceKeyMap[dev].label}切换指令`, 800);
                    }).catch(()=>showExecMsg(`指令失败`, 1000));
                });
            });
        }
    }
    
    function showExecMsg(msg, duration=1500) {
        const msgDiv = document.getElementById('sceneExecMsg');
        if(msgDiv) { msgDiv.innerText = msg; if(duration>0) setTimeout(()=>{ if(msgDiv.innerText===msg) msgDiv.innerText=''; }, duration); }
    }
    
    function bindControlButtons() {
        const btns = document.querySelectorAll('.action-btn');
        btns.forEach(btn => {
            const devKey = btn.getAttribute('data-device');
            if(devKey && deviceKeyMap[devKey]) {
                btn.addEventListener('click', async () => {
                    if(isExecutingScene) { showExecMsg("场景执行中,稍后操作", 1000); return; }
                    await sendCommandByDeviceKey(devKey);
                    showExecMsg(`📡 控制: ${deviceKeyMap[devKey].label}`, 800);
                    setTimeout(()=>fetchLatestSensorData(), 200);
                });
            }
        });
    }
    
    function startPolling() {
        if(pollingInterval) clearInterval(pollingInterval);
        fetchLatestSensorData();
        pollingInterval = setInterval(() => {
            if(!isExecutingScene) fetchLatestSensorData();
        }, 600);
    }
    
    function initMainPanel() {
        loadScenesFromLocal();
        startPolling();
        startTimeSync();    // 启动网络时间显示
        bindControlButtons();
        document.getElementById('editConfigBtn').onclick = () => {
            const newUid = prompt("输入巴法云UID", uid);
            const newDataTopic = prompt("数据主题", dataTopic);
            const newCtrlTopic = prompt("控制主题", ctrlTopic);
            if(newUid) uid = newUid;
            if(newDataTopic) dataTopic = newDataTopic;
            if(newCtrlTopic) ctrlTopic = newCtrlTopic;
            startPolling();
        };
        document.getElementById('addSceneBtn').onclick = () => openSceneEditor(null);
        fetchLatestSensorData();
    }
    
    document.getElementById('doLoginBtn').addEventListener('click', () => {
        const pwd = document.getElementById('loginPass').value;
        if(pwd === '12345678') {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
            initMainPanel();
        } else {
            alert("密码错误");
        }
    });
</script>
