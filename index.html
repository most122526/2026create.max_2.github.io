<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>智能控制面板 | 巴法云场景联动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a1e2f 0%, #0f1222 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, -apple-system, sans-serif;
            padding: 20px 16px 40px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 手机容器 */
        .phone-app {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            background: rgba(22, 26, 40, 0.75);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            overflow: hidden;
            padding: 20px 18px 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 登录界面卡片 */
        .login-card, .main-panel {
            transition: all 0.3s ease;
        }

        .glass-card {
            background: rgba(18, 22, 35, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 24px 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #E0E7FF, #A5B4FC);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 8px;
        }

        .sub {
            text-align: center;
            color: #8b93b0;
            font-size: 0.8rem;
            margin-bottom: 28px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #b9c3e6;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #2e3a5e;
            padding: 14px 16px;
            border-radius: 28px;
            font-size: 0.95rem;
            color: #f0f3ff;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #6c8eff;
            box-shadow: 0 0 0 2px rgba(108, 142, 255, 0.3);
        }

        .btn-primary {
            background: linear-gradient(95deg, #4f6ef5, #7c3aff);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            margin-top: 12px;
            box-shadow: 0 6px 14px rgba(79, 110, 245, 0.3);
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn-primary:active { transform: scale(0.97); }

        .status-badge {
            font-size: 0.7rem;
            background: #1e2a3e;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            color: #b9e6ff;
        }

        /* 仪表盘样式 */
        .sensor-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .sensor-card {
            flex: 1;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 28px;
            padding: 14px 8px;
            text-align: center;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sensor-label {
            font-size: 0.75rem;
            color: #9aa5c6;
            letter-spacing: 1px;
        }

        .sensor-value {
            font-size: 1.9rem;
            font-weight: 700;
            color: #eef3ff;
            line-height: 1.2;
        }

        .unit {
            font-size: 0.8rem;
            color: #7b89b0;
        }

        /* 设备状态网格 */
        .device-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0 24px;
        }

        .device-item {
            background: #11161f;
            border-radius: 28px;
            padding: 12px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #262f41;
            transition: 0.2s;
        }

        .device-name {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .led-indicator {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background: #3a435e;
            box-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
        .led-indicator.on {
            background: #2effb0;
            box-shadow: 0 0 8px #2effb0;
        }
        .led-indicator.off {
            background: #ff5e7c;
        }

        .ctrl-btn-small {
            background: #2a3448;
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 600;
            color: white;
            font-size: 0.75rem;
            cursor: pointer;
        }

        /* 按钮控制栏 */
        .button-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 28px;
            justify-content: space-between;
        }

        .action-btn {
            flex: 1;
            background: #232b3f;
            border: none;
            padding: 12px 0;
            border-radius: 60px;
            font-weight: 600;
            color: #cddcff;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .action-btn:active { background: #3b4770; transform: scale(0.96);}

        /* 场景专区 */
        .scene-section {
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }
        .scene-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 14px;
        }
        .scene-title {
            font-weight: 600;
            color: #bfceff;
        }
        .add-scene {
            background: none;
            border: 1px solid #5f7ef2;
            border-radius: 40px;
            padding: 4px 14px;
            color: #a7befa;
            font-size: 0.7rem;
        }
        .scene-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .scene-card {
            background: #0e1422dd;
            border-radius: 24px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #6c8eff;
        }
        .scene-info {
            flex: 1;
        }
        .scene-name {
            font-weight: 600;
            font-size: 1rem;
        }
        .scene-actions {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background: #2c354c;
            border: none;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 0.7rem;
            color: white;
        }

        .exec-status {
            font-size: 0.7rem;
            color: #a5f7b0;
            margin-top: 8px;
            text-align: center;
        }

        /* 模态框 */
        .modal-mask {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-container {
            width: 90%;
            max-width: 420px;
            background: #1a1f2e;
            border-radius: 40px;
            padding: 20px;
            border: 1px solid #4c6396;
        }
        .action-list {
            max-height: 320px;
            overflow-y: auto;
            margin: 15px 0;
        }
        .action-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            align-items: center;
        }
        select, .modal-container input {
            background: #0a0f1a;
            border: 1px solid #2e3a5e;
            padding: 8px 12px;
            border-radius: 24px;
            color: white;
        }
        button.danger { background: #b91c2e; }
    </style>
</head>
<body>
<div class="phone-app" id="app">
    <!-- 登录界面 -->
    <div id="loginPanel" class="glass-card">
        <h1>🏠 智能中枢</h1>
        <div class="sub">巴法云 · 场景联动面板</div>
        <div class="input-group">
            <label>🔑 登录密码</label>
            <input type="password" id="loginPass" placeholder="请输入密码" value="12345678">
        </div>
        <button class="btn-primary" id="doLoginBtn">进入控制台 →</button>
        <div style="margin-top: 20px; font-size:12px; color:#7e8aa8; text-align:center;">支持场景顺序+自定义间隔<br>极速响应·一键回家</div>
    </div>

    <!-- 主面板 (默认隐藏) -->
    <div id="mainPanel" style="display: none;">
        <!-- 配置栏简洁 -->
        <div style="background: rgba(0,0,0,0.3); border-radius: 50px; padding: 8px 14px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size:0.7rem;">⚙️ 巴法云</span>
            <button id="editConfigBtn" style="background: none; border: none; color:#bbd7ff; font-size:0.7rem;">✏️ 修改配置</button>
        </div>
        
        <!-- 温湿度传感器卡片 -->
        <div class="sensor-row">
            <div class="sensor-card"><div class="sensor-label">🌡️ 温度</div><div class="sensor-value" id="tempValue">--</div><div class="unit">°C</div></div>
            <div class="sensor-card"><div class="sensor-label">💧 湿度</div><div class="sensor-value" id="humiValue">--</div><div class="unit">%RH</div></div>
        </div>

        <!-- 设备状态指示 + 单独控制按钮融合 -->
        <div class="device-grid" id="deviceStatusGrid">
            <!-- 动态js渲染: 风扇,窗帘,照明,加湿器,报警 -->
        </div>

        <div class="button-bar">
            <button class="action-btn" data-device="fan">🌀 风扇</button>
            <button class="action-btn" data-device="curtain">🪟 窗帘</button>
            <button class="action-btn" data-device="light">💡 照明</button>
            <button class="action-btn" data-device="humidifier">💨 加湿器</button>
            <button class="action-btn" data-device="alarm">🚨 报警</button>
        </div>

        <!-- 场景自定义区域 -->
        <div class="scene-section">
            <div class="scene-header">
                <span class="scene-title">🎬 智能场景 (顺序执行)</span>
                <button id="addSceneBtn" class="add-scene">+ 自定义场景</button>
            </div>
            <div id="sceneListContainer" class="scene-list">
                <!-- 场景卡片动态 -->
            </div>
            <div id="sceneExecMsg" class="exec-status"></div>
        </div>
    </div>
</div>

<script>
    // ---------- 全局变量 ----------
    let uid = "28449f804baf4a4a87efedc38a9e60ac";
    let dataTopic = "wifiyuyinshuju";
    let ctrlTopic = "wifiyuyinctrl";
    let separator = "#";
    let isLoggedIn = false;
    let pollingInterval = null;
    let currentState = {   // 设备状态映射: 风扇,窗帘,照明,加湿器,报警
        fan: false,      // true=开
        curtain: false,
        light: false,
        humidifier: false,
        alarm: false
    };
    let temperature = "--";
    let humidity = "--";
    
    // 场景数组 { id, name, actions: [{ deviceKey, delayMs }] }
    let scenes = [];
    let sceneNextId = 1;
    
    // 场景执行锁
    let isExecutingScene = false;
    
    // 设备映射
    const deviceKeyMap = {
        fan: { key: 'fan', btnCmd: 'a1', label: '风扇', stateKey: 'fan' },
        curtain: { key: 'curtain', btnCmd: 'a2', label: '窗帘', stateKey: 'curtain' },
        light: { key: 'light', btnCmd: 'a3', label: '照明', stateKey: 'light' },
        humidifier: { key: 'humidifier', btnCmd: 'a4', label: '加湿器', stateKey: 'humidifier' },
        alarm: { key: 'alarm', btnCmd: 'a5', label: '报警', stateKey: 'alarm' }
    };
    const deviceList = ['fan', 'curtain', 'light', 'humidifier', 'alarm'];
    
    // ---------- 辅助函数 ----------
    function saveScenesToLocal() {
        localStorage.setItem('smart_scenes', JSON.stringify(scenes));
        localStorage.setItem('sceneNextId', sceneNextId);
    }
    function loadScenesFromLocal() {
        const saved = localStorage.getItem('smart_scenes');
        if(saved) {
            scenes = JSON.parse(saved);
            const savedId = localStorage.getItem('sceneNextId');
            if(savedId) sceneNextId = parseInt(savedId);
            else sceneNextId = scenes.length ? Math.max(...scenes.map(s=>s.id),0)+1 : 1;
        } else {
            // 默认两个示例场景：回家模式（先开照明，再开风扇，再窗帘）
            scenes = [
                { id: sceneNextId++, name: "🏡 回家模式", actions: [
                    { deviceKey: "light", delayMs: 300 },
                    { deviceKey: "fan", delayMs: 400 },
                    { deviceKey: "curtain", delayMs: 300 }
                ] },
                { id: sceneNextId++, name: "🌙 睡眠模式", actions: [
                    { deviceKey: "light", delayMs: 200 },
                    { deviceKey: "fan", delayMs: 200 }
                ] }
            ];
            saveScenesToLocal();
        }
        renderSceneList();
    }
    
    // 渲染场景列表UI
    function renderSceneList() {
        const container = document.getElementById('sceneListContainer');
        if(!container) return;
        if(scenes.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#6e7aa3; padding:16px;">点击+ 添加场景</div>';
            return;
        }
        container.innerHTML = scenes.map(scene => `
            <div class="scene-card" data-scene-id="${scene.id}">
                <div class="scene-info">
                    <div class="scene-name">${escapeHtml(scene.name)}</div>
                    <div style="font-size: 0.65rem; color:#9aa9cc;">${scene.actions.length}个动作</div>
                </div>
                <div class="scene-actions">
                    <button class="icon-btn edit-scene" data-id="${scene.id}">✏️</button>
                    <button class="icon-btn run-scene" data-id="${scene.id}">▶️ 执行</button>
                    <button class="icon-btn delete-scene" data-id="${scene.id}" style="background:#5a2a36;">🗑️</button>
                </div>
            </div>
        `).join('');
        // 绑定事件
        document.querySelectorAll('.edit-scene').forEach(btn => {
            btn.addEventListener('click', (e) => { const id = parseInt(btn.dataset.id); openSceneEditor(id); });
        });
        document.querySelectorAll('.run-scene').forEach(btn => {
            btn.addEventListener('click', (e) => { const id = parseInt(btn.dataset.id); triggerSceneById(id); });
        });
        document.querySelectorAll('.delete-scene').forEach(btn => {
            btn.addEventListener('click', (e) => { const id = parseInt(btn.dataset.id); deleteSceneById(id); });
        });
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}
    
    function deleteSceneById(id) {
        scenes = scenes.filter(s => s.id !== id);
        saveScenesToLocal();
        renderSceneList();
        showExecMsg(`场景已删除`, 1500);
    }
    
    // 打开场景编辑器 (模态框)
    function openSceneEditor(sceneId = null) {
        let scene = sceneId ? scenes.find(s=>s.id === sceneId) : null;
        const isNew = !scene;
        let name = scene ? scene.name : "新场景";
        let actions = scene ? [...scene.actions] : [];
        
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal-mask';
        modalDiv.innerHTML = `
            <div class="modal-container">
                <h3 style="margin-bottom:12px;">${isNew ? '新建场景' : '编辑场景'}</h3>
                <div class="input-group" style="margin-bottom:12px;">
                    <label>场景名称</label>
                    <input id="sceneNameInput" value="${escapeHtml(name)}" placeholder="例如: 回家模式">
                </div>
                <div><label>📋 动作序列 (顺序执行开启设备)</label></div>
                <div id="actionEditorList" class="action-list"></div>
                <button id="addActionBtn" style="background:#2c3e66; border:none; border-radius:40px; padding:8px; width:100%; margin-bottom:12px;">+ 添加动作</button>
                <div style="display:flex; gap:12px;">
                    <button id="saveSceneBtn" class="btn-primary" style="flex:1;">保存场景</button>
                    <button id="closeModalBtn" style="flex:1; background:#3f475e;">取消</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        
        const actionContainer = modalDiv.querySelector('#actionEditorList');
        function renderActions() {
            actionContainer.innerHTML = '';
            actions.forEach((act, idx) => {
                const row = document.createElement('div');
                row.className = 'action-row';
                const devSelect = document.createElement('select');
                deviceList.forEach(dk => {
                    const opt = document.createElement('option');
                    opt.value = dk;
                    opt.textContent = deviceKeyMap[dk].label;
                    if(act.deviceKey === dk) opt.selected = true;
                    devSelect.appendChild(opt);
                });
                const delayInput = document.createElement('input');
                delayInput.type = 'number';
                delayInput.value = act.delayMs;
                delayInput.placeholder = '延迟(ms)';
                delayInput.style.width = '90px';
                const removeBtn = document.createElement('button');
                removeBtn.textContent = '✖';
                removeBtn.style.background = '#ad3446';
                removeBtn.style.border = 'none';
                removeBtn.style.borderRadius = '30px';
                removeBtn.style.padding = '4px 12px';
                removeBtn.onclick = () => { actions.splice(idx,1); renderActions(); };
                row.appendChild(devSelect);
                row.appendChild(delayInput);
                row.appendChild(removeBtn);
                actionContainer.appendChild(row);
                // 实时更新数据
                devSelect.onchange = () => { act.deviceKey = devSelect.value; };
                delayInput.onchange = () => { act.delayMs = parseInt(delayInput.value) || 200; };
            });
        }
        renderActions();
        
        modalDiv.querySelector('#addActionBtn').onclick = () => {
            actions.push({ deviceKey: 'light', delayMs: 400 });
            renderActions();
        };
        modalDiv.querySelector('#saveSceneBtn').onclick = () => {
            const newName = modalDiv.querySelector('#sceneNameInput').value.trim();
            if(!newName) { alert("请输入场景名称"); return; }
            if(actions.length === 0) { alert("至少添加一个动作"); return; }
            const finalActions = actions.map(a => ({ deviceKey: a.deviceKey, delayMs: Math.max(80, a.delayMs || 200) }));
            if(isNew) {
                const newId = sceneNextId++;
                scenes.push({ id: newId, name: newName, actions: finalActions });
            } else {
                scene.name = newName;
                scene.actions = finalActions;
            }
            saveScenesToLocal();
            renderSceneList();
            document.body.removeChild(modalDiv);
            showExecMsg(`场景“${newName}”已保存`, 1200);
        };
        modalDiv.querySelector('#closeModalBtn').onclick = () => document.body.removeChild(modalDiv);
    }
    
    // 执行场景的核心逻辑 (先关所有设备 -> 顺序开启)
    async function triggerSceneById(sceneId) {
        if(isExecutingScene) { showExecMsg("已有场景执行中,请稍后...", 1500); return; }
        const scene = scenes.find(s=>s.id === sceneId);
        if(!scene) return;
        isExecutingScene = true;
        showExecMsg(`🏃 执行场景: ${scene.name} ... 获取最新设备状态`, 0);
        try {
            // 1. 拉取最新状态 (确保状态准确)
            await fetchLatestSensorData();
            // 2. 收集当前需要关闭的设备（状态为开的设备）
            const toCloseDevices = deviceList.filter(devKey => currentState[devKey] === true);
            // 关闭所有设备的间隔 (快速响应 120ms)
            const CLOSE_INTERVAL = 130;
            showExecMsg(`⏳ 关闭所有已开启设备 (共${toCloseDevices.length}个)`, 1500);
            for(let i=0; i<toCloseDevices.length; i++) {
                const devKey = toCloseDevices[i];
                await sendCommandByDeviceKey(devKey);  // 发送切换指令
                if(i !== toCloseDevices.length-1) await delay(CLOSE_INTERVAL);
            }
            // 3. 按照场景顺序开启设备 (每个动作发送切换指令，因为已经关闭了，切换就是开)
            showExecMsg(`✨ 开始顺序执行动作: ${scene.actions.length}步`, 1000);
            for(let i=0; i<scene.actions.length; i++) {
                const action = scene.actions[i];
                const devKey = action.deviceKey;
                const waitMs = action.delayMs;
                // 发送切换指令 (由于关闭后当前设备是关，发送即开启)
                await sendCommandByDeviceKey(devKey);
                showExecMsg(`✅ 已触发: ${deviceKeyMap[devKey].label}`, 800);
                if(i !== scene.actions.length-1) await delay(waitMs);
            }
            showExecMsg(`🎉 场景 "${scene.name}" 执行完成！`, 2000);
            // 执行完后快速轮询一次更新UI状态
            setTimeout(()=> fetchLatestSensorData(), 300);
        } catch(err) {
            console.error(err);
            showExecMsg(`❌ 场景执行出错: ${err.message}`, 2500);
        } finally {
            isExecutingScene = false;
        }
    }
    
    function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
    
    // 发送指令 (通过设备key)
    async function sendCommandByDeviceKey(deviceKey) {
        const cmd = deviceKeyMap[deviceKey].btnCmd;
        return sendBemfaCommand(cmd);
    }
    
    // 巴法云发送指令
    async function sendBemfaCommand(command) {
        try {
            const params = new URLSearchParams();
            params.append('uid', uid);
            params.append('topic', ctrlTopic);
            params.append('type', '3');
            params.append('msg', command);
            const response = await fetch('https://apis.bemfa.com/va/postmsg', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            });
            if(!response.ok) throw new Error("发送失败");
            return true;
        } catch(e) {
            console.warn("发送指令错误", e);
            throw e;
        }
    }
    
    // 获取最新数据并解析 #温度#湿度#状态参数#
    async function fetchLatestSensorData() {
        try {
            const url = `https://apis.bemfa.com/va/getmsg?uid=${uid}&topic=${dataTopic}&type=3&num=1`;
            const resp = await fetch(url);
            const data = await resp.json();
            if(data && data.data && data.data.length > 0 && data.data[0].msg) {
                const rawMsg = data.data[0].msg;
                // 格式: #25#68#21210#
                const parts = rawMsg.split(separator).filter(p => p.trim() !== "");
                if(parts.length >= 3) {
                    temperature = parts[0];
                    humidity = parts[1];
                    let stateParam = parts[2].toString();
                    while(stateParam.length < 5) stateParam = "0"+stateParam;
                    // 万位: 风扇 (2开 1关) => 我们解析为 true开 false关
                    const fanState = (stateParam.charAt(0) === '2'); // 万位为2表示风扇打开
                    const curtainState = (stateParam.charAt(1) === '1');
                    const lightState = (stateParam.charAt(2) === '1');
                    const humidifierState = (stateParam.charAt(3) === '1');
                    const alarmState = (stateParam.charAt(4) === '1');
                    currentState = {
                        fan: fanState,
                        curtain: curtainState,
                        light: lightState,
                        humidifier: humidifierState,
                        alarm: alarmState
                    };
                    updateUI();
                }
            }
        } catch(e) { console.warn("轮询错误", e); }
    }
    
    // 更新UI：温湿度 + 设备卡片 + 单独按钮样式
    function updateUI() {
        document.getElementById('tempValue').innerText = temperature;
        document.getElementById('humiValue').innerText = humidity;
        const grid = document.getElementById('deviceStatusGrid');
        if(grid) {
            grid.innerHTML = deviceList.map(devKey => {
                const dev = deviceKeyMap[devKey];
                const isOn = currentState[devKey];
                return `
                    <div class="device-item">
                        <div class="device-name">
                            <span class="led-indicator ${isOn ? 'on' : 'off'}"></span>
                            <span>${dev.label}</span>
                        </div>
                        <button class="ctrl-btn-small" data-devctrl="${devKey}">${isOn ? '关闭' : '开启'}</button>
                    </div>
                `;
            }).join('');
            // 绑定快捷开关
            document.querySelectorAll('[data-devctrl]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const dev = btn.getAttribute('data-devctrl');
                    sendCommandByDeviceKey(dev).then(()=>{
                        // 发送后等待状态刷新，轮询会自动更新，无需额外操作
                        showExecMsg(`已发送${deviceKeyMap[dev].label}切换指令`, 800);
                    }).catch(()=>showExecMsg(`指令失败`, 1000));
                });
            });
        }
    }
    
    function showExecMsg(msg, duration=1500) {
        const msgDiv = document.getElementById('sceneExecMsg');
        if(msgDiv) { msgDiv.innerText = msg; if(duration>0) setTimeout(()=>{ if(msgDiv.innerText===msg) msgDiv.innerText=''; }, duration); }
    }
    
    // 单独按钮注册 (风扇等5个独立)
    function bindControlButtons() {
        const btns = document.querySelectorAll('.action-btn');
        const map = { '风扇':'fan', '窗帘':'curtain', '照明':'light', '加湿器':'humidifier', '报警':'alarm' };
        btns.forEach(btn => {
            const txt = btn.innerText.trim();
            let devKey = null;
            if(txt.includes('风扇')) devKey='fan';
            else if(txt.includes('窗帘')) devKey='curtain';
            else if(txt.includes('照明')) devKey='light';
            else if(txt.includes('加湿器')) devKey='humidifier';
            else if(txt.includes('报警')) devKey='alarm';
            if(devKey) {
                btn.addEventListener('click', async () => {
                    if(isExecutingScene) { showExecMsg("场景执行中,稍后操作", 1000); return; }
                    await sendCommandByDeviceKey(devKey);
                    showExecMsg(`📡 控制: ${deviceKeyMap[devKey].label}`, 800);
                    setTimeout(()=>fetchLatestSensorData(), 200);
                });
            }
        });
    }
    
    // 轮询启动
    function startPolling() {
        if(pollingInterval) clearInterval(pollingInterval);
        fetchLatestSensorData();
        pollingInterval = setInterval(() => {
            if(!isExecutingScene) fetchLatestSensorData();
        }, 600);
    }
    
    // 主界面初始化 (配置加载)
    function initMainPanel() {
        // 加载场景
        loadScenesFromLocal();
        startPolling();
        bindControlButtons();
        // 编辑配置弹窗简易版
        document.getElementById('editConfigBtn').onclick = () => {
            const newUid = prompt("输入巴法云UID", uid);
            const newDataTopic = prompt("数据主题", dataTopic);
            const newCtrlTopic = prompt("控制主题", ctrlTopic);
            if(newUid) uid = newUid;
            if(newDataTopic) dataTopic = newDataTopic;
            if(newCtrlTopic) ctrlTopic = newCtrlTopic;
            startPolling();
        };
        document.getElementById('addSceneBtn').onclick = () => openSceneEditor(null);
        // 额外强制刷新状态
        fetchLatestSensorData();
    }
    
    // 登录验证
    document.getElementById('doLoginBtn').addEventListener('click', () => {
        const pwd = document.getElementById('loginPass').value;
        if(pwd === '12345678') {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
            initMainPanel();
        } else {
            alert("密码错误");
        }
    });
    
    // 若已有localstorage 也可以免登? 为了安全保留登录步骤，无自动登录。
</script>
